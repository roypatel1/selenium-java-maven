name: Selenium Tests

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG Suite File'
        required: true
        default: 'testngTestAll.xml'
      headless:
        description: 'Run in Headless Mode?'
        required: true
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Chrome
        run: |
          sudo apt-get update
#         sudo apt-get install -y google-chrome-stable
          sudo apt-get install -y google-chrome-stable xvfb

#      - name: Run Tests
#        run: mvn clean test -DsuiteXmlFile=${{ github.event.inputs.suite }} -Denv=ci -Dheadless=true

      - name: Run Tests
        run: |
            xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            mvn clean test -DsuiteXmlFile=${{ github.event.inputs.suite }} -Denv=ci -Dheadless=${{ github.event.inputs.headless }}

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-report
          path: target/test-output